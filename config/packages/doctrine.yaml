doctrine:
    dbal:
        # PostgreSQL — Español Latinoamérica / FansiteCMS
        # Cambia DATABASE_URL en .env a:
        # postgresql://user:pass@127.0.0.1:5432/fansite?serverVersion=15&charset=utf8
        url: '%env(resolve:DATABASE_URL)%'
        # Driver PostgreSQL:
        driver: 'pdo_pgsql'
        server_version: '15'
        charset: utf8

        # Cuando uses Symfony UX Turbo, descomenta:
        # use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
